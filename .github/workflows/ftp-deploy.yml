name: Deploy to FTP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  web-deploy:
    name: Build and Deploy Web
    environment:
      name: prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: VITE_BASE_PATH=/mlrs/flash/ npm run build
        working-directory: web

      - name: Deploy via FTPS
        run: |
          cd web/dist
          find . -type f | parallel -j 10 \
            'curl --insecure --ftp-ssl --silent --show-error \
                  --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
                  --upload-file {} \
                  "ftp://${{ secrets.FTP_SERVER }}/flash/{}" \
                  --ftp-create-dirs && echo "✓ Uploaded: {}"'
